# Ruff configuration — Dynasty Genius repo lint-hygiene policy (Phase 0).
# Authoritative policy: docs/strategies/2026-05-25-repo-linting-hygiene-spec.md
# (promotion to docs/governance/03-code-hygiene-policy.md is a later phase).
#
# Scope is deliberately the known correctness/hygiene debt (~226 default-style
# findings) plus import sorting (I), NOT broad E/W/UP/B/RUF — that would turn a
# hygiene ratchet into a formatting/modernization churn project (verified: the
# broad set explodes to ~2,600 findings on this repo).

[tool.ruff]
target-version = "py314"
line-length = 88

[tool.ruff.lint]
# E712 is intentionally SELECTED (via E7), not ignored: pandas / Polars / NumPy
# vectorized boolean masks must be hand-reviewed and given a narrow `# noqa: E712`
# where the comparison is intentional, rather than auto-"fixed". Never run ruff
# with --unsafe-fixes.
select = ["E4", "E7", "E9", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]   # package re-exports are not "unused imports"
"tests/**" = ["E402"]          # late imports after fixture / path / env setup are intentional
"scripts/**" = ["E402"]        # one-shot scripts set up sys.path / env before importing
