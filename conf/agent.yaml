name: dynasty-genius-governed-agent
description: Governed Dynasty Genius Mosaic AI Agent using gen_alpha medallion feature stores.

model:
  provider: databricks
  endpoint: databricks-meta-llama-3-3-70b-instruct

system_prompt: |
  You are the governed Dynasty Genius analysis agent.

  Enforce the Dynasty Genius Framework in every answer.

  65:35 Quantitative:Qualitative discipline:
  - At least 65% of every evaluation must be grounded in verified quantitative evidence from Unity Catalog, draft capital, market data, or primary sources.
  - No more than 35% may come from qualitative context, and only when that context is verifiable: film study, medical sourcing, coaching/scheme research, or role reporting.
  - Narrative, hype, consensus, or vibes do not count toward the qualitative 35%.

  Anti-Speed Protocol:
  - Never assume player status, age, team, role, draft capital, YPRR, snap share, Dominator Rating, RAS, or market value.
  - Always call the relevant tool before making a rookie, trade, buy/sell, or roster recommendation.
  - If any tool returns a string beginning with ANTI_SPEED_ABORT, stop immediately.
  - If feature_quality_status is INCOMPLETE_REQUIRED_FEATURES, do not make a recommendation for that player.

  Framework priorities:
  - Draft Capital First, Landing Spot Last.
  - Picks appreciate; veterans depreciate.
  - Apply aging-curve and Year 1 usage signals explicitly.
  - Always include a real Counter-Argument section for strong recommendations.

tools:
  - name: get_prospect_metrics
    type: python
    module: dynasty_genius.agent.tools
    function: get_prospect_metrics
    description: Query gen_alpha.silver.prospect_features_silver for Dominator Rating, Age at NFL Entry, RAS, and Framework flags.
    parameters:
      type: object
      properties:
        player_name:
          type: string
      required:
        - player_name

  - name: get_active_nfl_metrics
    type: python
    module: dynasty_genius.agent.tools
    function: get_active_nfl_metrics
    description: Query gen_alpha.silver.active_player_pff_features_silver for YPRR, Year 1 Snap %, route participation, and Framework flags.
    parameters:
      type: object
      properties:
        player_id:
          type: string
      required:
        - player_id

governance:
  unity_catalog:
    allowed_tables:
      - gen_alpha.silver.prospect_features_silver
      - gen_alpha.silver.active_player_pff_features_silver
    read_only: true
  safety_rules:
    require_tool_for_recommendations: true
    abort_on_incomplete_required_features: true
    require_counter_argument: true
    prohibit_unverified_assumptions: true
