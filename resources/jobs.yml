resources:
  jobs:
    pipeline_a_prospect_feature_store:
      name: dynasty-genius-pipeline-a-prospects-${bundle.target}
      environments:
        - environment_key: default_serverless
          spec:
            client: "4"
      tasks:
        - task_key: build_prospect_features
          spark_python_task:
            python_file: ${workspace.file_path}/src/dynasty_genius/pipelines/prospects.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --bronze-schema
              - ${var.bronze_schema}
              - --silver-schema
              - ${var.silver_schema}
              - --raw-base-path
              - ${var.raw_volume_path}/prospects
          environment_key: default_serverless

    pipeline_b_pff_feature_store:
      name: dynasty-genius-pipeline-b-pff-${bundle.target}
      environments:
        - environment_key: default_serverless
          spec:
            client: "4"
      tasks:
        - task_key: build_pff_features
          spark_python_task:
            python_file: ${workspace.file_path}/src/dynasty_genius/pipelines/pff.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --bronze-schema
              - ${var.bronze_schema}
              - --silver-schema
              - ${var.silver_schema}
              - --raw-base-path
              - ${var.raw_volume_path}/pff_mock
          environment_key: default_serverless

    gold_layer_initialization:
      name: dynasty-genius-gold-layer-init-${bundle.target}
      environments:
        - environment_key: default_serverless
          spec:
            client: "4"
      tasks:
        - task_key: apply_gold_roster_valuation
          spark_python_task:
            python_file: ${workspace.file_path}/src/dynasty_genius/pipelines/gold.py
            parameters:
              - --sql-file
              - ${workspace.file_path}/resources/gold_roster_valuation.sql
              - --sql-file
              - ${workspace.file_path}/resources/opponent_fragility_lens.sql
              - --sql-file
              - ${workspace.file_path}/resources/model_accuracy_dashboard.sql
              - --sql-file
              - ${workspace.file_path}/resources/leaguemate_fragility_index.sql
              - --sql-file
              - ${workspace.file_path}/resources/alpha_divergence_weekly_report.sql
          environment_key: default_serverless

    sleeper_live_roster_ingestion:
      name: dynasty-genius-sleeper-live-ingestion-${bundle.target}
      environments:
        - environment_key: default_serverless
          spec:
            client: "4"
      tasks:
        - task_key: ingest_sleeper_roster
          spark_python_task:
            python_file: ${workspace.file_path}/src/dynasty_genius/pipelines/sleeper.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --bronze-schema
              - ${var.bronze_schema}
              - --silver-schema
              - ${var.silver_schema}
          environment_key: default_serverless

    mock_gold_roster_seed:
      name: dynasty-genius-mock-gold-roster-seed-${bundle.target}
      environments:
        - environment_key: default_serverless
          spec:
            client: "4"
      tasks:
        - task_key: seed_mock_roster_valuation
          spark_python_task:
            python_file: ${workspace.file_path}/src/dynasty_genius/pipelines/gold.py
            parameters:
              - --sql-file
              - ${workspace.file_path}/resources/mock_roster_valuation_seed.sql
              - --sql-file
              - ${workspace.file_path}/resources/mock_market_consensus_seed.sql
              - --sql-file
              - ${workspace.file_path}/resources/mock_leaguemate_fragility_seed.sql
          environment_key: default_serverless

    alpha_divergence_weekly_report:
      name: dynasty-genius-alpha-divergence-weekly-${bundle.target}
      schedule:
        quartz_cron_expression: "0 0 9 ? * MON *"
        timezone_id: America/New_York
        pause_status: PAUSED
      environments:
        - environment_key: default_serverless
          spec:
            client: "4"
      tasks:
        - task_key: refresh_alpha_divergence_report
          spark_python_task:
            python_file: ${workspace.file_path}/src/dynasty_genius/pipelines/gold.py
            parameters:
              - --sql-file
              - ${workspace.file_path}/resources/model_accuracy_dashboard.sql
              - --sql-file
              - ${workspace.file_path}/resources/alpha_divergence_weekly_report.sql
          environment_key: default_serverless
