name: Codex Audit

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/codex_audit.yml"
      - "resources/**/*.sql"
      - "scripts/codex_audit_sql.py"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/codex_audit.yml"
      - "resources/**/*.sql"
      - "scripts/codex_audit_sql.py"

jobs:
  sql-governance:
    name: SQL governance audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate trade evaluation SQL governance
        run: python scripts/codex_audit_sql.py resources
