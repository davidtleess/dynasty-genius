name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Ruff lint gate (Phase 3 ratchet). Version MUST match the rev in
      # .pre-commit-config.yaml. Production scope only (src/app at zero selected
      # findings); tests/scripts legacy debt is handled by the on-touch ratchet.
      - name: Install Ruff
        run: python -m pip install ruff==0.15.12

      - name: Lint production Python (Ruff)
        run: ruff check src app

      - name: Compile application
        run: PYTHONPYCACHEPREFIX=.pycache_tmp python -m compileall app

      - name: Validate governance bootstrap
        run: python scripts/validate_governance.py

      - name: Validate rookie training split
        run: |
          PYTHONPYCACHEPREFIX=.pycache_tmp python - <<'PY'
          import pandas as pd

          from app.data.pipeline.train_models import CSV_PATH, build_temporal_split

          df = pd.read_csv(CSV_PATH)
          train_df, holdout_df, split_info = build_temporal_split(df)

          assert not train_df.empty, "training split is empty"
          assert not holdout_df.empty, "holdout split is empty"
          assert split_info["training_seasons"], "training seasons are missing"
          assert split_info["holdout_seasons"], "holdout seasons are missing"
          assert max(split_info["training_seasons"]) < min(split_info["holdout_seasons"]), split_info
          PY

      - name: Run pytest
        run: PYTHONPATH=. PYTHONPYCACHEPREFIX=.pycache_tmp pytest -q

      - name: Verify storage policy
        run: |
          tracked_artifacts="$(git ls-files app/cache app/data/raw app/data/processed app/data/artifacts)"
          if [ -n "$tracked_artifacts" ]; then
            echo "Generated artifacts are tracked unexpectedly:"
            echo "$tracked_artifacts"
            exit 1
          fi

  # Frontend (Stack-A) checks run in an isolated Node job. GitHub Actions jobs are
  # isolated runners, so this job owns the authoritative build/dist gate: the Python
  # job never builds the frontend and frontend/dist is a gitignored artifact. The
  # Python-side scaffold contract test skips its dist assertion when dist is absent.
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.node-version"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean)
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint (Biome)
        working-directory: frontend
        run: npm run lint

      - name: Test (Vitest)
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Verify SPA build output exists
        working-directory: frontend
        run: test -f dist/index.html
